name: Build Safari DMG

# Триггеры:
#   - push тега вида v1.2.3 → собрать релизный DMG и приложить к GitHub Release
#   - ручной запуск (Actions → Build Safari DMG → Run workflow)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # нужно, чтобы создать/обновить Release и залить asset

concurrency:
  group: build-dmg-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: "FB Ad Library Scraper"
  APP_BUNDLE_ID: "agency.ftg.fb-ad-library-scraper"   # ← поменяй на свой reverse-DNS

jobs:
  build:
    runs-on: macos-14          # macOS-раннер обязателен (Xcode + safari-web-extension-converter)
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Выбрать стабильный Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ---- Подпись: импорт Developer ID сертификата во временный keychain ----
      - name: Импорт Developer ID сертификата
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Разрешить codesign использовать ключ без интерактивного запроса.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          # Сделать наш keychain видимым для инструментов сборки.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

          # Достать точное имя identity и пробросить в следующие шаги.
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep 'Developer ID Application' | head -1 | sed -E 's/.*\) "(.*)"$/\1/')"
          if [ -z "$IDENTITY" ]; then
            echo "Developer ID Application identity не найдена в keychain" >&2
            security find-identity -v -p codesigning "$KEYCHAIN" >&2
            exit 1
          fi
          echo "Найдена identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"

      # ---- Собрать папку расширения и сконвертировать в проект Xcode ----
      - name: Собрать папку расширения (src + manifest)
        run: bash scripts/build.sh

      - name: Конвертер → проект Xcode (headless)
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/xcodeproj"
          mkdir -p "$RUNNER_TEMP/xcodeproj"
          xcrun safari-web-extension-converter dist/safari \
            --app-name "$APP_NAME" \
            --bundle-identifier "$APP_BUNDLE_ID" \
            --project-location "$RUNNER_TEMP/xcodeproj" \
            --macos-only --copy-resources --no-open --no-prompt --force

      # ---- Сборка + подпись Developer ID через xcodebuild ----
      - name: xcodebuild (Release, Developer ID, hardened runtime)
        run: |
          set -euo pipefail
          PROJ="$(find "$RUNNER_TEMP/xcodeproj" -name '*.xcodeproj' -maxdepth 2 | head -1)"
          echo "Проект: $PROJ"
          SCHEME="$(xcodebuild -list -project "$PROJ" -json \
            | python3 -c 'import json,sys;print(json.load(sys.stdin)["project"]["schemes"][0])')"
          echo "Схема: $SCHEME"

          xcodebuild \
            -project "$PROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            -destination 'generic/platform=macOS' \
            clean build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

          APP="$(find "$RUNNER_TEMP/dd/Build/Products/Release" -maxdepth 1 -name '*.app' | head -1)"
          echo "Собранный .app: $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "APP_PATH=$APP" >> "$GITHUB_ENV"

      # ---- DMG + нотаризация + staple ----
      - name: Собрать DMG
        run: |
          set -euo pipefail
          mkdir -p dist
          DMG="dist/${APP_NAME// /-}.dmg"
          bash scripts/make-dmg.sh "$APP_PATH" "$DMG" "$APP_NAME"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"

      - name: Нотаризация DMG (notarytool)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple
        run: |
          set -euo pipefail
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -t open --context context:primary-signature -v "$DMG_PATH" || true

      # ---- Публикация ----
      - name: Залить DMG в Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          fail_on_unmatched_files: true

      - name: Артефакт DMG (для ручного запуска без тега)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: safari-dmg
          path: ${{ env.DMG_PATH }}
