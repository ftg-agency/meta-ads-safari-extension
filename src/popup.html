<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>Ad Library Scraper</title>
</head>
<body>
  <h1>Ad Library Scraper</h1>

  <div class="statusbar">
    <span id="status" class="status">Готов</span>
    <span class="count"><b id="count">0</b> объявл.</span>
  </div>

  <!-- Полный авто: одна кнопка. -->
  <button id="btnRun" class="primary big">Собрать объявления</button>

  <!-- Живой лог процесса. -->
  <div id="log" class="log" aria-live="polite"></div>

  <div class="exports">
    <div class="exports-title">Сохранить результат</div>
    <div class="row wrap">
      <button id="btnArchive" disabled>Архив (ZIP)</button>
      <button id="btnCSV" disabled>CSV</button>
      <button id="btnJSON" disabled>JSON</button>
    </div>
    <button id="btnClear" class="ghost small" disabled>Очистить собранное</button>
  </div>

  <details id="adv">
    <summary>Дополнительно</summary>
    <label class="check"><input type="checkbox" id="deep" checked> Полный текст из карточек (медленнее)</label>
    <label class="check"><input type="checkbox" id="deepEu"> Данные по охвату в ЕС (ещё медленнее, выше риск лимита)</label>
    <label class="field">Максимум объявлений (0 — без лимита)
      <input type="number" id="maxAds" value="0" min="0" step="50">
    </label>
    <p class="hint">
      Совет: меньше всего риск блокировки — собирать одного рекламодателя
      (<code>…/ads/library/?…&amp;view_all_page_id=&lt;ID&gt;</code>),
      а не широкий поиск по ключевым словам.
    </p>
  </details>

  <script src="lib/ext-api.js"></script>
  <script src="lib/zip.js"></script>
  <script src="lib/exporter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
