<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>Ad Library Scraper</title>
</head>
<body>
  <h1>Ad Library Scraper</h1>

  <div class="statusbar">
    <span id="status" class="status">Готов</span>
    <span class="count"><b id="count">0</b> объявл.</span>
  </div>

  <button id="btnRun" class="primary big">Собрать объявления</button>

  <!-- Прогресс: полоса + строка -->
  <div class="progress" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-text" id="progressText">Готов к сбору</div>

  <label class="check main-opt"><input type="checkbox" id="deepEu"> Собирать данные по охвату в ЕС <span class="muted">(медленнее)</span></label>

  <label class="field">Максимум объявлений <span class="muted">(0 — без лимита)</span>
    <input type="number" id="maxAds" value="0" min="0" step="50">
  </label>

  <button id="btnArchive" class="big" disabled>Скачать архив (ZIP)</button>

  <script src="lib/ext-api.js"></script>
  <script src="lib/zip.js"></script>
  <script src="lib/exporter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
